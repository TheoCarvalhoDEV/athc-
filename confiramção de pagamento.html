<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmação de Pagamento </title>
    <style>
        /* RESET BÁSICO */
        body {
            margin: 0;
            padding: 0;
            background-color: #f8fafc;
            /* Fundo levemente mais frio e moderno */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Container Principal */
        .payment-success-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, sans-serif;
            text-align: center;
            padding: 48px 32px;
            background-color: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.08), 0 1px 3px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 420px;
        }

        /* Tipografia e Textos */
        .success-message {
            color: #166534;
            /* Verde mais denso e confiável */
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-top: 28px;
            margin-bottom: 8px;
            opacity: 0;
            /* Uso de curva de mola sutil */
            animation: springUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.6s forwards;
        }

        .success-details {
            color: #475569;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 32px;
            opacity: 0;
            animation: springUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.75s forwards;
        }

        /* Botão de Ação Premium */
        .success-action-btn {
            background-color: #22c55e;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            animation: springUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.9s forwards;
            box-shadow: 0 4px 12px rgba(34, 197, 94, 0.2);
        }

        .success-action-btn:hover {
            background-color: #16a34a;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(34, 197, 94, 0.3);
        }

        .success-action-btn:active {
            transform: translateY(0);
        }

        /* Envoltório do Ícone para o efeito de Pulso */
        .icon-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Pulso Luminoso de Fundo */
        .pulse-ring {
            position: absolute;
            width: 100px;
            height: 100px;
            background-color: rgba(34, 197, 94, 0.15);
            border-radius: 50%;
            z-index: 0;
            opacity: 0;
            animation: pulseGlow 2s cubic-bezier(0.4, 0, 0.6, 1) 0.5s infinite;
        }

        /* Animação do Checkmark (SVG) */
        .checkmark {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            display: block;
            stroke-width: 3;
            stroke: #22c55e;
            stroke-miterlimit: 10;
            z-index: 1;
            box-shadow: inset 0px 0px 0px #22c55e;
            animation: fillBackgroundPremium 0.5s ease-in-out 0.4s forwards;
        }

        .checkmark__circle {
            stroke-dasharray: 166;
            stroke-dashoffset: 166;
            stroke-width: 3;
            stroke-miterlimit: 10;
            stroke: #22c55e;
            fill: none;
            animation: strokeDraw 0.6s cubic-bezier(0.65, 0, 0.45, 1) forwards;
        }

        .checkmark__check {
            transform-origin: 50% 50%;
            stroke-dasharray: 48;
            stroke-dashoffset: 48;
            animation: strokeDraw 0.4s cubic-bezier(0.65, 0, 0.45, 1) 0.5s forwards;
        }

        /* -------------------------------------
           KEYFRAMES REFINADOS
        ------------------------------------- */

        @keyframes strokeDraw {
            100% {
                stroke-dashoffset: 0;
            }
        }

        /* Preenchimento suave de fundo para o ícone */
        @keyframes fillBackgroundPremium {
            0% {
                box-shadow: inset 0px 0px 0px 0px rgba(34, 197, 94, 0);
            }

            100% {
                box-shadow: inset 0px 0px 0px 40px rgba(34, 197, 94, 0.1);
            }
        }

        /* Efeito de mola: escala levemente menor e sobe */
        @keyframes springUp {
            0% {
                opacity: 0;
                transform: translateY(20px) scale(0.95);
            }

            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Pulso luminoso contínuo e suave */
        @keyframes pulseGlow {
            0% {
                transform: scale(0.8);
                opacity: 0;
            }

            50% {
                opacity: 1;
            }

            100% {
                transform: scale(1.4);
                opacity: 0;
            }
        }
    </style>
</head>

<body>

    <div class="payment-success-container" role="alert" aria-live="polite">

        <div class="icon-wrapper">
            <div class="pulse-ring"></div>
            <svg class="checkmark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52">
                <circle class="checkmark__circle" cx="26" cy="26" r="25" fill="none" />
                <path class="checkmark__check" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8" />
            </svg>
        </div>

        <h2 class="success-message">Pagamento Aprovado</h2>
        <p class="success-details">A transação foi concluída com segurança.</p>


    </div>

</body>

</html>
