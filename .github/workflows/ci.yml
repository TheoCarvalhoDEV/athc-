# CI/CD do Atchêi
#
# - Em Pull Requests e pushes para `master`: instala, builda e roda os testes (frontend e functions).
# - Em push para `master` (após o build/testes passarem): faz deploy de hosting + functions + regras.
#
# Secrets necessários no repositório (Settings > Secrets and variables > Actions):
#   FIREBASE_SERVICE_ACCOUNT      JSON da conta de serviço com permissão de deploy (Firebase Admin/Deploy)
#   MP_ACCESS_TOKEN               Token do Mercado Pago (runtime das functions)
#   MP_WEBHOOK_SECRET             Segredo de assinatura do webhook do Mercado Pago (runtime das functions)
#   ENV_FILE                      Conteúdo do .env do frontend (todas as linhas VITE_...=valor). O build
#                                 recria o .env a partir desse secret antes de rodar o Vite.
#
# IMPORTANTE: o deploy de functions (gen2) define o ambiente a partir de functions/.env. Por isso o
# job de deploy RECRIA functions/.env a partir de MP_ACCESS_TOKEN e MP_WEBHOOK_SECRET — sem isso, o
# MP_WEBHOOK_SECRET seria removido do Cloud Run e o webhook passaria a rejeitar todas as notificações.
# O job de deploy é pulado automaticamente se FIREBASE_SERVICE_ACCOUNT não estiver configurado.

name: CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-test:
    name: Build e Testes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências (frontend)
        run: npm ci

      - name: Recriar .env do frontend (a partir do secret ENV_FILE)
        run: |
          cat > .env <<'ENVEOF'
          ${{ secrets.ENV_FILE }}
          ENVEOF

      - name: Build (tsc + vite)
        run: npm run build

      - name: Testes (frontend)
        run: npm run test:run

      - name: Instalar dependências (functions)
        run: npm ci
        working-directory: functions

      - name: Testes (functions)
        run: npm test
        working-directory: functions

  deploy:
    name: Deploy (produção)
    needs: build-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    # Pula o deploy de forma limpa (job verde) quando a credencial não está configurada.
    env:
      HAS_DEPLOY_CREDS: ${{ secrets.FIREBASE_SERVICE_ACCOUNT != '' }}
    steps:
      - name: Aviso se sem credencial
        if: env.HAS_DEPLOY_CREDS != 'true'
        run: echo "::warning::FIREBASE_SERVICE_ACCOUNT ausente — deploy pulado. Configure os secrets para habilitar."

      - uses: actions/checkout@v4
        if: env.HAS_DEPLOY_CREDS == 'true'

      - uses: actions/setup-node@v4
        if: env.HAS_DEPLOY_CREDS == 'true'
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências (frontend)
        if: env.HAS_DEPLOY_CREDS == 'true'
        run: npm ci

      - name: Recriar .env do frontend (a partir do secret ENV_FILE)
        if: env.HAS_DEPLOY_CREDS == 'true'
        run: |
          cat > .env <<'ENVEOF'
          ${{ secrets.ENV_FILE }}
          ENVEOF

      - name: Build (tsc + vite)
        if: env.HAS_DEPLOY_CREDS == 'true'
        run: npm run build

      - name: Instalar dependências (functions)
        if: env.HAS_DEPLOY_CREDS == 'true'
        run: npm ci
        working-directory: functions

      # Recria functions/.env a partir dos secrets para que o deploy gen2 preserve o ambiente de runtime.
      - name: Configurar ambiente das functions
        if: env.HAS_DEPLOY_CREDS == 'true'
        run: |
          {
            echo "MP_ACCESS_TOKEN=${{ secrets.MP_ACCESS_TOKEN }}"
            echo "MP_WEBHOOK_SECRET=${{ secrets.MP_WEBHOOK_SECRET }}"
          } > functions/.env

      # Autentica no Google Cloud/Firebase via conta de serviço (define GOOGLE_APPLICATION_CREDENTIALS).
      - name: Autenticação Firebase
        if: env.HAS_DEPLOY_CREDS == 'true'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Deploy Firebase
        if: env.HAS_DEPLOY_CREDS == 'true'
        run: npx firebase-tools@latest deploy --only hosting,functions,firestore:rules,storage --project atche-sistemas --non-interactive
